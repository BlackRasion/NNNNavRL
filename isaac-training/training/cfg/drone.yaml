# =============================================================================
# 无人机和传感器配置文件
# =============================================================================
# 该文件配置无人机模型和 LiDAR 传感器参数
# 这些参数直接影响观测空间和策略网络的输入维度
# =============================================================================

# -----------------------------------------------------------------------------
# 无人机模型配置
# -----------------------------------------------------------------------------
drone:  
  model_name: "hummingbird"      # hummingbird: 小型四旋翼无人机 其他可选: firefly, neo11, etc.

# -----------------------------------------------------------------------------
# LiDAR (激光雷达) 传感器配置
# -----------------------------------------------------------------------------
# LiDAR 是主要的障碍物感知传感器
# 扫描数据作为 CNN 的输入，用于检测障碍物
sensor:
  lidar_range: 4.                   # LiDAR 最大探测范围（单位: 米） 超过此范围的障碍物不会被检测到
                                    # 影响观测空间大小和计算量
  
  lidar_vfov: [-10, 20.]            # 垂直视场角范围（单位: 度）
                                    # [-10°, 20°] 表示从水平向下 10° 到向上 20°  总垂直视野 = 30°
  
  lidar_vbeams: 4                   # 垂直方向射线数量 将垂直视场均分为 4 层扫描线
                                    # 每层间隔: (20 - (-10)) / (4-1) = 10°
  
  lidar_hres: 10.                   # 水平角分辨率（单位: 度） 每 10° 发出一个射线
                                    # 水平扫描线点数: 360° / 10° = 36 个射线 
                                    # Lidar总数据量：水平点数 × 垂直层数 = 36 × 4 = 144 个射线数据
