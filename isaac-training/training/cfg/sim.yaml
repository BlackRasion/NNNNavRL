# =============================================================================
# Isaac Sim 物理仿真配置文件
# =============================================================================
# 该文件配置 NVIDIA Isaac Sim 的物理引擎参数
# 这些参数影响仿真的精度、性能和稳定性
#
# 注意: 修改这些参数可能影响训练结果的可复现性
# =============================================================================

sim:
  # ---------------------------------------------------------------------------
  # 基础仿真参数
  # ---------------------------------------------------------------------------
  dt: 0.016                         # 仿真时间步长（单位: 秒）
                                    # 0.016s = 16ms，对应 60 FPS
                                    # 较小的值提高精度但增加计算量
  
  substeps: 1                       # 每个时间步的子步数
                                    # 增加子步数提高物理精度
                                    # 总物理步长 = dt / substeps
  
  gravity: [0, 0, -9.81]            # 重力加速度向量（单位: m/s²）
                                    # [x, y, z] 方向
                                    # 标准地球重力: 9.81 m/s² 向下
  
  replicate_physics: false          # 是否跨环境复制物理状态
                                    # false: 每个环境独立物理模拟
  
  use_flatcache: true               # 使用 FlatCache 加速
                                    # 提高 GPU 内存访问效率
  
  use_gpu_pipeline: true            # 使用 GPU 流水线
                                    # 在 GPU 上执行物理计算
                                    # 大幅提高并行环境性能
  
  device: "cuda:0"                  # 物理计算设备

  # ---------------------------------------------------------------------------
  # PhysX 求解器配置
  # ---------------------------------------------------------------------------
  # PhysX 是 NVIDIA 的物理引擎，用于刚体动力学模拟
  solver_type: 1                    # 求解器类型
                                    # 0: PGS (Projected Gauss-Seidel)
                                    # 1: TGS (Temporal Gauss-Seidel) - 推荐，更稳定
  
  use_gpu: True                     # 使用 GPU 进行物理计算
                                    # True: GPU 加速（推荐）
                                    # False: CPU 计算（慢但兼容性好）
  
  # ---------------------------------------------------------------------------
  # 接触和摩擦参数
  # ---------------------------------------------------------------------------
  bounce_threshold_velocity: 0.2    # 反弹速度阈值（单位: m/s）
                                    # 低于此速度的碰撞不产生反弹
  
  friction_offset_threshold: 0.04   # 摩擦偏移阈值
                                    # 控制静摩擦和动摩擦的过渡
  
  friction_correlation_distance: 0.025  # 摩擦相关距离
                                    # 影响摩擦力的计算精度
  
  enable_stabilization: True        # 启用稳定性优化
                                    # 减少数值误差导致的抖动
  
  enable_scene_query_support: true  # 启用场景查询支持
                                    # 允许射线检测、碰撞检测等查询

  # ---------------------------------------------------------------------------
  # GPU 缓冲区配置（高级）
  # ---------------------------------------------------------------------------
  # 这些参数控制 GPU 内存分配，影响大规模仿真的稳定性
  # 如果训练时出现内存错误或崩溃，可能需要调整这些值
  
  gpu_max_rigid_contact_count: 524288
                                    # 最大刚体接触点数量
                                    # 影响碰撞检测精度
  
  gpu_max_rigid_patch_count: 163840 # 最大刚体贴片数量
                                    # 影响复杂碰撞的处理能力
  
  gpu_found_lost_pairs_capacity: 4194304
                                    # 发现/丢失对容量
                                    # 影响宽相碰撞检测
  
  gpu_found_lost_aggregate_pairs_capacity: 33554432
                                    # 聚合对容量
  
  gpu_total_aggregate_pairs_capacity: 4194304
                                    # 总聚合对容量
  
  gpu_max_soft_body_contacts: 1048576
                                    # 最大软体接触数
  
  gpu_max_particle_contacts: 1048576
                                    # 最大粒子接触数
  
  gpu_heap_capacity: 67108864       # GPU 堆容量（字节）
  
  gpu_temp_buffer_capacity: 16777216
                                    # 临时缓冲区容量（字节）
  
  gpu_max_num_partitions: 8         # 最大分区数
                                    # 影响并行处理能力
