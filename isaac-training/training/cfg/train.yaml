# =============================================================================
# NavRL 主训练配置文件
# =============================================================================
# 该文件是训练流程的主配置文件，通过 Hydra 框架加载#
# 使用方法:
#   python training/scripts/train.py  # 使用默认配置
#   python training/scripts/train.py env.num_envs=1024 wandb.mode=online  # 命令行覆盖
# =============================================================================

# -----------------------------------------------------------------------------
# 默认配置继承（Hydra 配置组合）
# -----------------------------------------------------------------------------
# _self_: 当前文件的配置
# drone: 无人机和传感器配置 (drone.yaml)
# ppo: PPO 算法配置 (ppo.yaml)
# sim: 仿真参数配置 (sim.yaml)
defaults:
  - _self_
  - drone
  - ppo
  - sim

# -----------------------------------------------------------------------------
# 基础设置
# -----------------------------------------------------------------------------
headless: False                    # 是否无头模式运行（True=无GUI，适合服务器训练）
device: "cuda:0"                   # 计算设备，使用第一块 GPU
seed: 0                            # 随机种子，保证实验可复现

# -----------------------------------------------------------------------------
# 多GPU训练设置
# -----------------------------------------------------------------------------
multi_gpu:
  enabled: True                    # 是否启用多GPU训练
  devices: [0, 1]                  # 使用的GPU设备列表 [0, 1] 表示使用两块RTX 4090
  num_gpus: 2                      # GPU数量
  # 训练策略:
  #   - "data_parallel": 数据并行，将batch分割到多个GPU
  #   - "env_parallel": 环境并行，每个GPU运行不同的环境（推荐用于RL）
  strategy: "env_parallel"         # 多GPU训练策略
  # DDP 梯度同步设置:
  #   - True: 启用梯度同步，所有GPU使用相同的梯度更新参数（更稳定）
  #   - False: 禁用梯度同步，每个GPU独立更新参数（更快但可能不稳定）
  use_ddp: True                    # 是否启用 DDP 梯度同步

# -----------------------------------------------------------------------------
# 训练总长度设置
# -----------------------------------------------------------------------------
max_frame_num: 12e8               # 最大训练帧数（12亿帧）计算公式: num_envs * training_frame_num * 训练步数
eval_interval: 1000               # 评估间隔：每 N 个训练步运行一次评估
save_interval: 1000               # 保存间隔：每 N 个训练步保存一次模型

# -----------------------------------------------------------------------------
# 训练环境设置
# -----------------------------------------------------------------------------
env:
  num_envs: 2                     # 并行环境数量（同时训练的无人机数量）
  max_episode_length: 2200        # 每个回合的最大步数（超过则截断）  按 sim.dt=0.016s 计算，约 35 秒仿真时间
  env_spacing: 8.0                # 环境间距（多个环境时的空间间隔）
  num_obstacles: 350              # 静态障碍物数量（随机生成的固定障碍物）

# -----------------------------------------------------------------------------
# 动态障碍物设置
# -----------------------------------------------------------------------------
env_dyn:
  num_obstacles: 80               # 动态障碍物数量（移动的障碍物）
  vel_range: [0.5, 1.5]           # 动态障碍物速度范围（米/秒）
  local_range: [5.0, 5.0, 4.5]    # 动态障碍物运动范围（以起点为中心的立方体） [x范围, y范围, z范围]

# -----------------------------------------------------------------------------
# 可视化观察器设置
# -----------------------------------------------------------------------------
viewer:
  eye: [0., 40., 40.]             # 相机位置（观察视角的位置）
  lookat: [0., 2.5, 0.]           # 相机注视点（相机看向哪里）
  resolution: [960, 720]          # 渲染分辨率（宽 x 高）

# -----------------------------------------------------------------------------
# Weights & Biases (WandB) 训练监控设置
# -----------------------------------------------------------------------------
# WandB 用于实时监控训练过程、记录超参数、可视化指标
# 官网: https://wandb.ai
wandb:
  project: NavRL                  # WandB 项目名称
  name: navigation_training       # 本次运行的名称（会显示在 WandB 仪表板）
  entity: CERLAB-UAV-RL-Navigation # WandB 团队/组织名称
  mode: offline                   # 运行模式:
                                  #   - online: 实时上传数据到 WandB 服务器
                                  #   - offline: 本地存储，稍后手动上传
                                  #   - disabled: 禁用 WandB
  run_id:                         # 运行 ID（用于断点续训） 例如: kw9xf9k9  留空则创建新运行
