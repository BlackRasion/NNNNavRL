# =============================================================================
# Go2 机器人和传感器配置文件
# =============================================================================
# 该文件配置 Go2 机器人模型和 LiDAR 传感器参数
# 这些参数直接影响观测空间和策略网络的输入维度
# =============================================================================

# -----------------------------------------------------------------------------
# Go2 机器人模型配置
# -----------------------------------------------------------------------------
go2:  
  model_name: "go2"               # go2: Unitree Go2 四足机器人

# -----------------------------------------------------------------------------
# LiDAR (激光雷达) 传感器配置
# -----------------------------------------------------------------------------
# LiDAR 是主要的障碍物感知传感器
# 扫描数据作为 CNN 的输入，用于检测障碍物
sensor:
  lidar_range: 4.                   # LiDAR 最大探测范围（单位: 米） 超过此范围的障碍物不会被检测到
                                    # 影响观测空间大小和计算量
  
  lidar_vfov: [0, 20.]              # 垂直视场角范围（单位: 度）
                                    # [0°, 20°] 表示从水平方向到向上 20° 总垂直视野 = 20°
  
  lidar_vbeams: 3                   # 垂直方向射线数量 将垂直视场均分为 3 层扫描线
                                    # 每层间隔: (20 - 0) / (3-1) = 10°
  
  lidar_hres: 10.                   # 水平角分辨率（单位: 度） 每 10° 发出一个射线
                                    # 水平扫描线点数: 360° / 10° = 36 个射线 
                                    # Lidar总数据量：水平点数 × 垂直层数 = 36 × 3 = 108 个射线数据
