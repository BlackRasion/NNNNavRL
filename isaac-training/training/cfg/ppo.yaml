# =============================================================================
# PPO (Proximal Policy Optimization) 算法（超参数）配置文件
# =============================================================================
algo:
  # ---------------------------------------------------------------------------
  # 特征提取器配置
  # ---------------------------------------------------------------------------
  # 特征提取器负责将原始观测（LiDAR、状态、动态障碍物）转换为特征向量
  feature_extractor:
    learning_rate: 5e-4             # 特征提取器学习率 -> 控制特征提取网络参数的更新速度
    dyn_obs_num: 5                  # 考虑的最近动态障碍物数量 -> 从所有动态障碍物中选择最近的 N 个
  # ---------------------------------------------------------------------------
  # Actor（策略网络）配置
  # ---------------------------------------------------------------------------
  # Actor 网络输出动作分布的参数（Beta 分布的 alpha 和 beta）
  actor:
    learning_rate: 5e-4             # Actor 网络学习率
    clip_ratio: 0.1                 # PPO 裁剪比例（epsilon）
                                    # 公式: ratio = pi_new / pi_old   clipped_ratio = clip(ratio, 1-ε, 1+ε)
    action_limit: 2.0               # 动作限制（最大速度，单位: m/s）  
  # ---------------------------------------------------------------------------
  # Critic（价值网络）配置
  # ---------------------------------------------------------------------------
  # Critic 网络估计状态价值 V(s)，用于计算优势函数和回报
  critic:
    learning_rate: 5e-4             # Critic 网络学习率
    clip_ratio: 0.1                 # 价值函数裁剪比例  
  # ---------------------------------------------------------------------------
  # 熵正则化配置
  # ---------------------------------------------------------------------------
  # 熵鼓励探索，防止策略过早收敛到局部最优
  # 损失函数: L = L_policy - entropy_coef * H(pi)
  entropy_loss_coefficient: 1e-3    # 熵损失系数 -> 值越大，策略越随机（探索越多）  
  # ---------------------------------------------------------------------------
  # 训练批次配置
  # ---------------------------------------------------------------------------
  training_frame_num: 32            # 每个环境每次收集的帧数
                                    # 总批次大小 = num_envs * training_frame_num
                                    # 例如: 1024 envs * 32 = 32768 帧/批次
  
  training_epoch_num: 4             # 每批数据的训练轮数（epochs）
                                    # 同一批数据会被重复使用 4 次进行训练
                                    # 提高样本效率，但过多会导致过拟合
  
  num_minibatches: 16               # 将批次分割为 N 个小批量（minibatches）
                                    # 实际 minibatch 大小 = 总批次 / num_minibatches
                                    # 例如: 32768 / 16 = 2048 帧/minibatch
                                    # 使用小批量训练提高稳定性和效率
